<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Nativity 3D Scene</title>
  <style>
    body { margin: 0; overflow: hidden; background: #000; }
    #info {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 10;
      color: #fff;
      font-family: sans-serif;
      background: rgba(0,0,0,0.5);
      padding: 10px;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div id="info">
    Наталийская сцена – используйте мышь для вращения/масштабирования, колесико для приближения.
  </div>
  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.152.0/build/three.module.js';
    import { OrbitControls } from 'https://unpkg.com/three@0.152.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://unpkg.com/three@0.152.0/examples/jsm/loaders/GLTFLoader.js';
    import { OBJLoader } from 'https://unpkg.com/three@0.152.0/examples/jsm/loaders/OBJLoader.js';
    import { MTLLoader } from 'https://unpkg.com/three@0.152.0/examples/jsm/loaders/MTLLoader.js';

    // Scene, camera, renderer
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0d1a);
    scene.fog = new THREE.FogExp2(0x0a0d1a, 0.02);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
    camera.position.set(0, 5, 15);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    // Controls
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 1.5, 0);
    controls.enableDamping = true;

    // Lights
    const ambient = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambient);

    const dirLight = new THREE.DirectionalLight(0xfff7e5, 1.0);
    dirLight.position.set(5, 10, 7);
    scene.add(dirLight);

    // Ground
    const groundGeo = new THREE.PlaneGeometry(60, 60);
    const groundMat = new THREE.MeshPhongMaterial({ color: 0x433218, side: THREE.DoubleSide });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    // Simple stable (barn) constructed from primitives
    function createStable() {
      const group = new THREE.Group();
      const wallMaterial = new THREE.MeshPhongMaterial({ color: 0x8b5a2b });
      const roofMaterial = new THREE.MeshPhongMaterial({ color: 0x5a3c17 });
      const base = new THREE.Mesh(new THREE.BoxGeometry(6, 3, 4), wallMaterial);
      base.position.y = 1.5;
      group.add(base);
      // roof
      const roof = new THREE.Mesh(new THREE.ConeGeometry(4.5, 1.8, 4), roofMaterial);
      roof.position.y = 3.5;
      roof.rotation.y = Math.PI / 4;
      group.add(roof);
      // door opening (empty in front)
      return group;
    }
    const stable = createStable();
    stable.position.set(0, 0, 0);
    scene.add(stable);

    // star above stable
    const starGeo = new THREE.IcosahedronGeometry(0.3, 0);
    const starMat = new THREE.MeshBasicMaterial({ color: 0xffffee, emissive: 0xffffaa });
    const star = new THREE.Mesh(starGeo, starMat);
    star.position.set(0, 5, 0);
    scene.add(star);

    // Particle system for gentle falling dust
    const particleCount = 400;
    const particlesGeo = new THREE.BufferGeometry();
    const positions = new Float32Array(particleCount * 3);
    for (let i = 0; i < particleCount; i++) {
      positions[i * 3 + 0] = (Math.random() - 0.5) * 40;
      positions[i * 3 + 1] = Math.random() * 8 + 1;
      positions[i * 3 + 2] = (Math.random() - 0.5) * 40;
    }
    particlesGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    const particlesMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.05, transparent: true, opacity: 0.8 });
    const particles = new THREE.Points(particlesGeo, particlesMat);
    scene.add(particles);

    // Updates for animation
    const updateCallbacks = [];

    // Helper to animate animals gently
    function addFloatAnimation(object, radius = 0.3, speed = 0.5, axis = 'x') {
      let angle = Math.random() * Math.PI * 2;
      updateCallbacks.push(() => {
        angle += speed * 0.01;
        if (axis === 'x') object.position.x += Math.sin(angle) * radius * 0.01;
        if (axis === 'z') object.position.z += Math.sin(angle) * radius * 0.01;
        object.position.y = 0; // keep on ground
      });
    }

    // Loaders
    const gltfLoader = new GLTFLoader();
    const mtlLoader = new MTLLoader();
    const objLoader = new OBJLoader();

    // Load donkey (glb)
    gltfLoader.load('models/donkey/donkey.glb', (gltf) => {
      const donkey = gltf.scene;
      donkey.scale.set(0.6, 0.6, 0.6);
      donkey.position.set(-3, 0, -1);
      scene.add(donkey);
      addFloatAnimation(donkey, 0.5, 0.8, 'x');
    });

    // Load horse
    mtlLoader.setPath('models/horse/');
    mtlLoader.load('LD_HorseRtime02.mtl', (horseMats) => {
      horseMats.preload();
      objLoader.setMaterials(horseMats);
      objLoader.setPath('models/horse/');
      objLoader.load('LD_HorseRtime02.obj', (horseObj) => {
        horseObj.scale.set(0.6, 0.6, 0.6);
        horseObj.position.set(3, 0, -2);
        scene.add(horseObj);
        addFloatAnimation(horseObj, 0.4, 0.7, 'z');
      });
    });

    // Load cow
    mtlLoader.setPath('models/cow/');
    mtlLoader.load('cowTM08New00RTime02.mtl', (cowMats) => {
      cowMats.preload();
      objLoader.setMaterials(cowMats);
      objLoader.setPath('models/cow/');
      objLoader.load('cowTM08New00RTime02.obj', (cowObj) => {
        cowObj.scale.set(0.6, 0.6, 0.6);
        cowObj.position.set(1, 0, 2);
        scene.add(cowObj);
        addFloatAnimation(cowObj, 0.3, 0.6, 'x');
      });
    });

    // Load characters (Mary, Joseph, wise man). We pick three models from the pack.
    const characterFiles = [
      'character-a.glb', // Mary
      'character-b.glb', // Joseph
      'character-c.glb'  // visitor/wise man
    ];
    const characterPositions = [
      { x: -0.8, y: 0, z: 0 },
      { x: 0.8, y: 0, z: 0 },
      { x: 0, y: 0, z: 2 }
    ];
    characterFiles.forEach((file, idx) => {
      gltfLoader.load(`models/characters/${file}`, (gltf) => {
        const char = gltf.scene;
        char.scale.set(0.8, 0.8, 0.8);
        char.position.set(characterPositions[idx].x, 0, characterPositions[idx].z);
        scene.add(char);
        // characters can slightly sway to simulate breathing
        let angle = Math.random() * Math.PI;
        updateCallbacks.push(() => {
          angle += 0.02;
          char.rotation.y = Math.sin(angle) * 0.05;
        });
      });
    });

    // Baby (small cube) placed between Mary and Joseph
    const babyGeometry = new THREE.SphereGeometry(0.2, 16, 16);
    const babyMaterial = new THREE.MeshStandardMaterial({ color: 0xffe0b3 });
    const baby = new THREE.Mesh(babyGeometry, babyMaterial);
    baby.position.set(0, 0.3, 0);
    scene.add(baby);
    // gentle rocking animation
    let babyAngle = 0;
    updateCallbacks.push(() => {
      babyAngle += 0.03;
      baby.position.y = 0.3 + Math.sin(babyAngle) * 0.05;
    });

    // Animate star
    let starPulse = 0;
    updateCallbacks.push(() => {
      starPulse += 0.05;
      const intensity = 0.7 + Math.sin(starPulse) * 0.3;
      star.material.emissiveIntensity = intensity;
    });

    // Update particles (dust)
    updateCallbacks.push(() => {
      const attr = particles.geometry.attributes.position;
      const arr = attr.array;
      for (let i = 0; i < particleCount; i++) {
        let y = arr[i * 3 + 1];
        y -= 0.03;
        if (y < 0) y = Math.random() * 8 + 2;
        arr[i * 3 + 1] = y;
      }
      attr.needsUpdate = true;
    });

    // Resize handling
    window.addEventListener('resize', () => {
      const width = window.innerWidth;
      const height = window.innerHeight;
      camera.aspect = width / height;
      camera.updateProjectionMatrix();
      renderer.setSize(width, height);
    });

    // Animation loop
    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      // call update callbacks
      updateCallbacks.forEach((cb) => cb());
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
